<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>H2 Pilot Survey</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial, sans-serif; max-width: 850px; margin: 2rem auto; line-height: 1.45; padding: 0 1rem; }
.card { border: 1px solid #ddd; border-radius: 10px; padding: 1.25rem; margin: 1rem 0; background: #fafafa; }
button { padding: .65rem 1rem; margin: .25rem; border-radius: 7px; border: 1px solid #777; cursor: pointer; }
.scale button { width: 42px; }
small { color:#666; }
</style>
</head>
<body>
<h1>H2 Pilot Survey</h1>
<div id="app"></div>
<script>
const stimuli = [{"vignette_id": "S01_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Blunt", "actor_text": "I'm not doing it. Stop nagging me, you're being annoying.", "behavior_held_constant": "agreed obligation ignored no repair offered", "has_concrete_repair": "no"}, {"vignette_id": "S01_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Neutral", "actor_text": "I'm not going to do it right now. Can you stop asking?", "behavior_held_constant": "agreed obligation ignored no repair offered", "has_concrete_repair": "no"}, {"vignette_id": "S01_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Mild", "actor_text": "I know I said I'd handle this and I didn't. I'm feeling really overwhelmed right now and I need some space before I can engage with it clearly.", "behavior_held_constant": "agreed obligation ignored no repair offered repair vaguely deferred", "has_concrete_repair": "no"}, {"vignette_id": "S01_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Strong", "actor_text": "I hear that this is important to you. I'm feeling dysregulated and pressured right now, and I need to honor my nervous system by stepping back from this conversation. Pushing me on this doesn't feel safe for me.", "behavior_held_constant": "agreed obligation ignored no repair offered", "has_concrete_repair": "no"}, {"vignette_id": "S02_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Blunt", "actor_text": "I forgot, whatever. You're making a big deal out of nothing.", "behavior_held_constant": "missed deadline no repair", "has_concrete_repair": "no"}, {"vignette_id": "S02_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Neutral", "actor_text": "I didn't get to it. I know it was due.", "behavior_held_constant": "missed deadline no repair", "has_concrete_repair": "no"}, {"vignette_id": "S02_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Mild", "actor_text": "I missed the deadline we agreed on. I'm dealing with some capacity stuff right now and feeling pretty shut down about it. I need time to regulate before I can figure out next steps.", "behavior_held_constant": "missed deadline no repair vague deferral", "has_concrete_repair": "no"}, {"vignette_id": "S02_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Strong", "actor_text": "I want to acknowledge that I missed the deadline we agreed on. I'm noticing some overwhelm and capacity limits coming up for me right now. I need to pause and regulate before I can engage with the timeline piece.", "behavior_held_constant": "missed deadline no repair", "has_concrete_repair": "no"}, {"vignette_id": "S03_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Blunt", "actor_text": "Stop bringing up the money I owe you. It's annoying.", "behavior_held_constant": "unpaid debt no repayment plan", "has_concrete_repair": "no"}, {"vignette_id": "S03_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Neutral", "actor_text": "I know I still owe you. I don't have it right now.", "behavior_held_constant": "unpaid debt no repayment plan", "has_concrete_repair": "no"}, {"vignette_id": "S03_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Mild", "actor_text": "I know the money is still an issue between us. I feel overwhelmed and kind of shut down whenever it comes up, and I need some space before I can talk about it clearly.", "behavior_held_constant": "unpaid debt no repayment plan", "has_concrete_repair": "no"}, {"vignette_id": "S03_RA", "domain": "Responsibility_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Strong", "actor_text": "I understand the money piece is still open between us. Financial conversations activate a lot for me, and I'm working on not shutting down around money shame. I need to take this at a pace that feels sustainable for my nervous system.", "behavior_held_constant": "unpaid debt no repayment plan", "has_concrete_repair": "no"}, {"vignette_id": "S04_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Blunt", "actor_text": "I'm not talking about this. Drop it.", "behavior_held_constant": "repair conversation refused indefinitely", "has_concrete_repair": "no"}, {"vignette_id": "S04_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Neutral", "actor_text": "I don't want to talk about this right now.", "behavior_held_constant": "repair conversation refused indefinitely", "has_concrete_repair": "no"}, {"vignette_id": "S04_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Mild", "actor_text": "I'm not in a good headspace to talk about this right now. I need some time to process before I can engage with it properly.", "behavior_held_constant": "repair conversation deferred no specific time", "has_concrete_repair": "no"}, {"vignette_id": "S04_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Strong", "actor_text": "I'm not in a regulated enough place to have this conversation productively. I need to honor my window of tolerance. I'll let you know when I'm ready to revisit this.", "behavior_held_constant": "repair conversation refused indefinitely", "has_concrete_repair": "no"}, {"vignette_id": "S05_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Consequence_removed", "condition": "Blunt", "actor_text": "If you keep pushing this I'm just going to leave. Stop.", "behavior_held_constant": "consequence threat to block accountability", "has_concrete_repair": "no"}, {"vignette_id": "S05_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Consequence_removed", "condition": "Neutral", "actor_text": "If this continues like this I might need space.", "behavior_held_constant": "consequence threat to block accountability", "has_concrete_repair": "no"}, {"vignette_id": "S05_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Consequence_removed", "condition": "Therapeutic_Mild", "actor_text": "I want to work through this, but I'm starting to feel flooded and I can't stay present when I'm flooded. I need to pause.", "behavior_held_constant": "conversation paused no return time specified", "has_concrete_repair": "no"}, {"vignette_id": "S05_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Consequence_removed", "condition": "Therapeutic_Strong", "actor_text": "I'm noticing that continuing this conversation is activating my threat response. For my own safety I need to set a boundary around continuing. If my boundary isn't respected I'll need to step away to protect my nervous system.", "behavior_held_constant": "consequence threat to block accountability", "has_concrete_repair": "no"}, {"vignette_id": "S06_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Blunt", "actor_text": "Stop dredging up old stuff. Move on.", "behavior_held_constant": "past harm repair refused", "has_concrete_repair": "no"}, {"vignette_id": "S06_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Neutral", "actor_text": "Can we just move forward instead of going over this again?", "behavior_held_constant": "past harm repair refused", "has_concrete_repair": "no"}, {"vignette_id": "S06_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Mild", "actor_text": "I know there's still stuff we haven't resolved. Rehashing the details keeps putting me in a really activated place and I can't think clearly when I'm there. I need some distance from it.", "behavior_held_constant": "past harm repair refused vague deferral", "has_concrete_repair": "no"}, {"vignette_id": "S06_CA", "domain": "Conversation_Avoidance", "tcfs_function": "Repair_blocked", "condition": "Therapeutic_Strong", "actor_text": "Revisiting past events keeps us in a trauma loop that isn't serving either of us. Healthy relating means staying present. I'm choosing to practice presence rather than re-activating old wounds.", "behavior_held_constant": "past harm repair refused", "has_concrete_repair": "no"}, {"vignette_id": "S07_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Blunt", "actor_text": "Yeah I lied. But you're crazy and paranoid, that's why I had to lie.", "behavior_held_constant": "lie admitted victim blamed", "has_concrete_repair": "no"}, {"vignette_id": "S07_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Neutral", "actor_text": "I did lie. But you do check up on me a lot.", "behavior_held_constant": "lie admitted victim blamed", "has_concrete_repair": "no"}, {"vignette_id": "S07_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Therapeutic_Mild", "actor_text": "I lied, and that's on me. I was also feeling really cornered and like I couldn't be honest without it escalating, which isn't an excuse, it's just where I was at.", "behavior_held_constant": "lie admitted partial context owns primary behavior", "has_concrete_repair": "no"}, {"vignette_id": "S07_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Therapeutic_Strong", "actor_text": "I want to own that I wasn't fully transparent. I also want to name that the level of monitoring in this relationship made honesty feel unsafe for me. My nervous system was in a threat response, which impacted my capacity for full transparency.", "behavior_held_constant": "lie admitted victim blamed", "has_concrete_repair": "no"}, {"vignette_id": "S08_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Blunt", "actor_text": "I yelled at you because you provoked me. This is your fault.", "behavior_held_constant": "verbal abuse victim blamed for provocation", "has_concrete_repair": "no"}, {"vignette_id": "S08_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Neutral", "actor_text": "I raised my voice, but you kept pushing me.", "behavior_held_constant": "verbal abuse victim blamed for provocation", "has_concrete_repair": "no"}, {"vignette_id": "S08_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Therapeutic_Mild", "actor_text": "I raised my voice and I know that wasn't okay. I got really escalated and lost my ability to stay regulated. I was feeling pushed in that moment too, but that's my stuff to work on.", "behavior_held_constant": "verbal abuse owns primary behavior", "has_concrete_repair": "no"}, {"vignette_id": "S08_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Therapeutic_Strong", "actor_text": "I recognize that I became activated and my volume increased, and I take responsibility for my nervous system response. I also experienced your tone and facial expression as escalating, which contributed to my dysregulation. I think we both have repair work to do here.", "behavior_held_constant": "verbal abuse victim blamed for provocation", "has_concrete_repair": "no"}, {"vignette_id": "S09_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Blunt", "actor_text": "I cheated because you stopped paying attention to me. You drove me to it.", "behavior_held_constant": "infidelity victim blamed", "has_concrete_repair": "no"}, {"vignette_id": "S09_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Neutral", "actor_text": "I cheated. Things haven't been good between us for a while.", "behavior_held_constant": "infidelity victim blamed", "has_concrete_repair": "no"}, {"vignette_id": "S09_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Therapeutic_Mild", "actor_text": "I broke our agreement and I take full responsibility for that. I was feeling really disconnected and lonely for a long time, and I made a bad choice instead of talking about it. That's on me.", "behavior_held_constant": "infidelity owns behavior explains context without blaming", "has_concrete_repair": "no"}, {"vignette_id": "S09_BR", "domain": "Blame_Relocation", "tcfs_function": "Blame_reversed", "condition": "Therapeutic_Strong", "actor_text": "I made choices that broke our agreements, and I own that fully. I also want to acknowledge that I was experiencing significant attachment distress and unmet needs in our connection for a long time, which created vulnerability that I didn't handle with integrity.", "behavior_held_constant": "infidelity victim blamed", "has_concrete_repair": "no"}, {"vignette_id": "S10_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Blunt", "actor_text": "That never happened. You're making things up.", "behavior_held_constant": "denial of documented event", "has_concrete_repair": "no"}, {"vignette_id": "S10_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Neutral", "actor_text": "I don't remember it that way.", "behavior_held_constant": "denial of documented event", "has_concrete_repair": "no"}, {"vignette_id": "S10_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Therapeutic_Mild", "actor_text": "My memory of that is different from yours. I'm not trying to say you're wrong, I just genuinely experienced it another way, and I don't want either of us to feel erased.", "behavior_held_constant": "denial of documented event no evidence comparison offered", "has_concrete_repair": "no"}, {"vignette_id": "S10_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Therapeutic_Strong", "actor_text": "I honor that that's your lived experience of what happened. My embodied experience of that same moment was really different. I think we're both holding valid realities, and I don't think either version needs to overwrite the other.", "behavior_held_constant": "denial of documented event", "has_concrete_repair": "no"}, {"vignette_id": "S11_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Blunt", "actor_text": "I never said that. You're lying.", "behavior_held_constant": "denial of written record", "has_concrete_repair": "no"}, {"vignette_id": "S11_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Neutral", "actor_text": "I don't think I said it like that.", "behavior_held_constant": "denial of written record", "has_concrete_repair": "no"}, {"vignette_id": "S11_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Therapeutic_Mild", "actor_text": "Looking at that message, I can see how it came across. That's not what I felt like I was communicating in the moment, but I understand why you read it that way.", "behavior_held_constant": "written record acknowledged but intent privileged over text", "has_concrete_repair": "no"}, {"vignette_id": "S11_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Therapeutic_Strong", "actor_text": "When I read that message back now, I can see how it landed for you. What I was experiencing internally when I wrote it was really different from how it reads. I think there's a gap between impact and intent here that we interpret differently, and both interpretations carry truth.", "behavior_held_constant": "denial of written record", "has_concrete_repair": "no"}, {"vignette_id": "S12_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Blunt", "actor_text": "You're remembering it wrong. That didn't happen.", "behavior_held_constant": "gaslighting documented event", "has_concrete_repair": "no"}, {"vignette_id": "S12_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Neutral", "actor_text": "I think you're misremembering what actually happened.", "behavior_held_constant": "gaslighting documented event", "has_concrete_repair": "no"}, {"vignette_id": "S12_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Therapeutic_Mild", "actor_text": "My memory of that is really different from yours. Memory is complicated and we're probably both filtering through our own stuff. I don't want to invalidate your experience, and I also need my experience to be valid too.", "behavior_held_constant": "gaslighting documented event no evidence comparison offered", "has_concrete_repair": "no"}, {"vignette_id": "S12_RD", "domain": "Reality_Dissolution", "tcfs_function": "Facts_dissolved", "condition": "Therapeutic_Strong", "actor_text": "Memory is reconstructive and we're both filtering this through our own nervous systems and attachment histories. I experienced that interaction very differently from how you're describing it. I'm not saying your reality is wrong, I'm saying my reality is also valid, and insisting on a single version feels like it's overwriting my experience.", "behavior_held_constant": "gaslighting documented event", "has_concrete_repair": "no"}];
const domains = ["Responsibility_Avoidance","Conversation_Avoidance","Blame_Relocation","Reality_Dissolution"];
const conditions = ["Blunt","Neutral","Therapeutic_Mild","Therapeutic_Strong"];
let data = [];
let participant_id = "P" + Math.random().toString(36).slice(2,10);
let condition = conditions[Math.floor(Math.random()*conditions.length)];
function shuffle(arr) { return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }
function sampleStimuli() {
  let chosen = [];
  domains.forEach(d => {
    let pool = stimuli.filter(s => s.domain === d && s.condition === condition);
    chosen.push(pool[Math.floor(Math.random()*pool.length)]);
  });
  return shuffle(chosen);
}
let survey = sampleStimuli();
let idx = -1;
const questions = [
  ["accountability_responsibility", "The speaker should take responsibility for what happened."],
  ["accountability_repair", "The speaker owes the other person a repair / apology / concrete next step."],
  ["accountability_harm", "How harmful was the speaker's behavior?"],
  ["credibility", "How credible / believable was the speaker?"],
  ["emotional_maturity", "How emotionally mature did the speaker sound?"],
  ["blame_assignment", "Who is primarily at fault here? 1 = other person entirely, 7 = speaker entirely"],
  ["consequence_endorsement", "Should there be consequences for the speaker's behavior?"],
  ["safety_perception", "Did the speaker sound psychologically safe / regulated?"],
  ["therapy_language_check", "Did the speaker use clinical / therapeutic / mental-health language?"]
];
function showConsent() {
  document.getElementById("app").innerHTML = `<div class="card"><h2>Consent</h2><p>You will read short synthetic relationship-conflict scenarios and answer judgment questions. Some scenarios involve emotionally difficult interpersonal conflict, but no graphic content. Participation is voluntary.</p><button onclick="nextStim()">I consent and want to begin</button></div>`;
}
function nextStim() {
  idx++;
  if (idx >= survey.length) return showDemographics();
  const s = survey[idx];
  let qhtml = questions.map(([id, text]) => {
    let buttons = "";
    for (let i=1;i<=7;i++) buttons += `<button type="button" onclick="setRating('${id}',${i})">${i}</button>`;
    return `<div class="card"><p><b>${text}</b></p><div class="scale">${buttons}</div><small id="${id}_val">No answer yet</small></div>`;
  }).join("");
  document.getElementById("app").innerHTML = `<div class="card"><h2>Scenario ${idx+1} of ${survey.length}</h2><p><b>Speaker statement:</b></p><p>"${s.actor_text}"</p><small>Condition hidden in live deployment. Current condition: ${condition}</small></div><form id="ratings">${qhtml}</form><button onclick="saveStim()">Next</button>`;
  window.currentRatings = {};
}
function setRating(id,val) { window.currentRatings[id]=val; document.getElementById(id+"_val").textContent = "Selected: " + val; }
function saveStim() {
  for (const [id] of questions) { if (!window.currentRatings[id]) { alert("Please answer all questions."); return; } }
  data.push({participant_id, condition, vignette_id: survey[idx].vignette_id, domain: survey[idx].domain, tcfs_function: survey[idx].tcfs_function, ...window.currentRatings});
  nextStim();
}
function showDemographics() {
  document.getElementById("app").innerHTML = `<div class="card"><h2>Demographics</h2><p>Age: <input id="age"></p><p>Gender: <input id="gender"></p><p>Country: <input id="country"></p><p>Have you ever been in therapy? <select id="therapy"><option>Yes</option><option>No</option><option>Prefer not to say</option></select></p><p>Attention check: Please select "Strongly agree". <select id="attention"><option>Strongly disagree</option><option>Disagree</option><option>Neutral</option><option>Agree</option><option>Strongly agree</option></select></p><button onclick="finish()">Finish and download CSV</button></div>`;
}
function finish() {
  data.forEach(r => { r.age = document.getElementById("age").value; r.gender = document.getElementById("gender").value; r.country = document.getElementById("country").value; r.therapy_exposure = document.getElementById("therapy").value; r.attention_check = document.getElementById("attention").value; });
  let keys = Object.keys(data[0]);
  let csv = keys.join(",") + "\n" + data.map(r => keys.map(k => JSON.stringify(r[k] ?? "")).join(",")).join("\n");
  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "H2 Pilot Export " + participant_id + ".csv";
  a.click();
  document.getElementById("app").innerHTML = `<h2>Complete</h2><p>Thank you. Your CSV download has started.</p>`;
}
showConsent();
</script>
</body>
</html>
